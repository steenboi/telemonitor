server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://192.168.1.169:3100/loki/api/v1/push

scrape_configs:
  - job_name: secure_log
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          host: asus-server
          __path__: /var/log/secure